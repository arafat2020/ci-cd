name: Lint, Format, Build & Deploy Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - "*"

jobs:

  ci-check:
    name: Lint, Format, Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm


      - name: Install dependencies
        run: npm ci --include=optional


      # Optional checks
      # - name: Run Lint
      #   run: npm run lint

      # - name: Format Check
      #   run: npm run format


      - name: Build Project
        run: npm run build
        env:
          VITE_API_ENDPOINT: ${{ secrets.VITE_API_ENDPOINT }}
          VITE_MAP_KEY: ${{ secrets.VITE_MAP_KEY }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}


      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 1



  deploy-build-files:
    name: Deploy Static Build Files
    runs-on: ubuntu-latest
    needs: [ci-check]
    if: github.ref == 'refs/heads/main'

    steps:

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/


      - name: Upload build files to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/${{ secrets.VPS_USER }}/deploy-temp"


      - name: Move files into web directory
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |

            echo "Starting deploy..."

            sudo mkdir -p /var/www/html

            echo "Removing old files..."
            sudo rm -rf /var/www/html/*

            echo "Moving new build..."
            sudo mv ~/deploy-temp/* /var/www/html/

            echo "Fixing permissions..."
            sudo chown -R 1000:1000 /var/www/html
            sudo chmod -R 755 /var/www/html

            echo "Cleaning temp..."
            sudo rm -rf ~/deploy-temp

            echo "Deploy complete"


      # ✅ DELETE ARTIFACT FROM CURRENT RUN ONLY
      - name: Delete artifact after deploy
        uses: actions/github-script@v7
        with:
          script: |

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const artifact = artifacts.data.artifacts.find(
              a => a.name === "build-dist"
            );

            if (artifact) {

              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });

              console.log("Artifact deleted");

            } else {

              console.log("Artifact not found");

            }
