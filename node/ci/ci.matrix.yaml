name: Build, Docker & Deploy

on:
  push:
    branches: [main]

jobs:
  # -------------------------
  # 1. CI Build
  # -------------------------
  ci-check:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build


  # -------------------------
  # 2. Build & Push Docker
  # -------------------------
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cheesus-app:latest


  # -------------------------
  # 3. Deploy (Matrix: 2 VPS)
  # -------------------------
  deploy:
    name: Deploy to Servers
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    # Matrix (NO secrets here)
    strategy:
      matrix:
        server: [server1, server2]

    # Load secrets into env
    env:
      VPS1_HOST: ${{ secrets.VPS1_HOST }}
      VPS1_PASSWORD: ${{ secrets.VPS1_PASSWORD }}
      VPS2_HOST: ${{ secrets.VPS2_HOST }}
      VPS2_PASSWORD: ${{ secrets.VPS2_PASSWORD }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.server == 'server1' && env.VPS1_HOST || env.VPS2_HOST }}
          username: root
          password: ${{ matrix.server == 'server1' && env.VPS1_PASSWORD || env.VPS2_PASSWORD }}
          script: |
            cd /backend

            echo "Deploying to ${{ matrix.server }}"

            docker compose pull

            docker compose up -d \
              --force-recreate \
              --remove-orphans

            docker image prune -f